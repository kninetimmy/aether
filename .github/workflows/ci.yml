name: CI

# Runs the same gate we run locally — ruff lint + format check, mypy, pytest —
# on every PR and every push to main, so nothing merges without a green check.
#
# Action pinning: first-party actions are pinned to a commit SHA with the moving
# tag in a trailing comment (mirrors the Free-AI-SSD supply-chain convention).
# When bumping, resolve the new SHA from the tag and update the pin + comment
# together, e.g.:
#   gh api repos/actions/checkout/commits/v6 --jq .sha

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Inherit a restrictive read-only token; this workflow only reads the repo.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (declared in pyproject: requires-python >=3.11) through latest.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (strict, src/)
        run: mypy
      - name: Start Mosquitto broker (bus integration tests)
        # The MQTT round-trip test (tests/integration) skips when no broker is
        # reachable; start one with the repo's loopback config so it runs in CI.
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto
          mosquitto -c deploy/mosquitto/mosquitto.conf -d
          for _ in $(seq 1 20); do
            if (exec 3<>/dev/tcp/127.0.0.1/1883) 2>/dev/null; then echo "broker up"; break; fi
            sleep 0.5
          done
      - name: Pytest
        run: pytest

  ci-success:
    # Single stable status check for branch protection: it stays "ci-success"
    # even if the test matrix gains or drops Python versions, so protection
    # rules never go stale. Fails if any matrix leg failed.
    name: ci-success
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Require all test jobs to pass
        run: |
          result="${{ needs.test.result }}"
          echo "test matrix result: $result"
          test "$result" = "success"
