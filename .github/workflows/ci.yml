name: CI

# Runs the same gate we run locally — ruff lint + format check, mypy, pytest —
# on every PR and every push to main, so nothing merges without a green check.
#
# Action pinning: first-party actions are pinned to a commit SHA with the moving
# tag in a trailing comment (mirrors the Free-AI-SSD supply-chain convention).
# When bumping, resolve the new SHA from the tag and update the pin + comment
# together, e.g.:
#   gh api repos/actions/checkout/commits/v6 --jq .sha

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Inherit a restrictive read-only token; this workflow only reads the repo.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Cap a wedged leg (e.g. a hung broker round-trip) so it fails in minutes
    # instead of holding the 6-hour default and blocking the merge gate.
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        # Floor (declared in pyproject: requires-python >=3.11) through latest.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable, with dev tools)
        run: |
          python -m pip install --upgrade pip
          # [orbital] = sgp4 (pure-Python wheel, zero deps) so the M6.5 orbital adapter +
          # SGP4 propagation path gets real CI coverage. Unlike [lightning]/netCDF4 (heavy
          # HDF5 system libs, kept out of CI and skipped via importorskip), sgp4 is cheap.
          pip install -e ".[dev,orbital]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy (strict, src/)
        run: mypy
      - name: Receive-only guard (no TX directives in sample Dire Wolf config)
        # The receive-only guarantee (decision 1 / PRD §2.3 / §18.3) rests on these
        # directives being ABSENT from config/direwolf.conf.example. Fail the build
        # if any appears uncommented, so the load-bearing guardrail is enforced and
        # the claim in the config + docs is true. (grep exits 0 when it matches.)
        run: |
          if grep -nE '^[[:space:]]*(IGTXVIA|IGTXLIMIT|PBEACON|OBEACON|TBEACON|CBEACON|IBEACON|SMARTBEACONING|DIGIPEAT|CDIGIPEAT|PTT)([[:space:]]|$)' config/direwolf.conf.example; then
            echo "ERROR: uncommented transmit/beacon directive found above; aether is RECEIVE-ONLY." >&2
            exit 1
          fi
      - name: Start Mosquitto broker (bus integration tests)
        # The MQTT round-trip test (tests/integration) skips when no broker is
        # reachable; start one with the repo's loopback config so it runs in CI.
        run: |
          sudo apt-get update
          sudo apt-get install -y mosquitto
          mosquitto -c deploy/mosquitto/mosquitto.conf -d
          for _ in $(seq 1 20); do
            if (exec 3<>/dev/tcp/127.0.0.1/1883) 2>/dev/null; then echo "broker up"; break; fi
            sleep 0.5
          done
      - name: Pytest
        run: pytest

  frontend:
    # Type-check, lint, unit-test, and production-build the frontend shell
    # (PRD §33: "Lint, type-check, unit tests, ..., frontend build").
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  ci-success:
    # Single stable status check for branch protection: it stays "ci-success"
    # even if the test matrix gains or drops Python versions, so protection
    # rules never go stale. Fails if any matrix leg failed.
    name: ci-success
    if: always()
    needs: [test, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass
        run: |
          echo "test: ${{ needs.test.result }} / frontend: ${{ needs.frontend.result }}"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.frontend.result }}" = "success"
