# Native (non-Docker) Mosquitto config for run.sh.
#
# The Docker config (../mosquitto.conf) relies on the published port mapping
# `127.0.0.1:1883:1883` to keep the broker loopback-only. A broker run natively
# (no Docker) has no such mapping, so it must bind loopback ITSELF: `listener
# 1883` alone listens on ALL interfaces and would expose the bus to the LAN,
# violating the private-by-default guardrail (PRD §6 / §23). The explicit bind
# address below is therefore load-bearing — do not drop it.
listener 1883 127.0.0.1
allow_anonymous true

log_dest stdout
log_type warning
log_type notice
persistence false
