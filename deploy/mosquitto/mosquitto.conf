# Mosquitto config for the aether local bus (PRD §23).
#
# Private by default: the broker is reachable only on loopback (the compose file
# binds the host port to 127.0.0.1). Anonymous access is acceptable precisely
# because nothing off-host can connect; if the broker is ever exposed beyond
# loopback this must gain authentication first (PRD §6 security guardrail).

listener 1883
allow_anonymous true

# Keep the container quiet but useful; logs go to stdout for `docker compose logs`.
log_dest stdout
log_type warning
log_type notice
persistence false
